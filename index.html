<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movix – Mapa Global</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map">Cargando mapa...</div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Firebase SDKs clásicos (v8.x) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configuración Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDYt3_RCyA4PZlH6zo-CtFJKBvjPorQG60",
      authDomain: "movix-prod.firebaseapp.com",
      databaseURL: "https://movix-prod-default-rtdb.firebaseio.com",
      projectId: "movix-prod",
      storageBucket: "movix-prod.firebasestorage.app",
      messagingSenderId: "662438290984",
      appId: "1:662438290984:web:eb852b36dac6e991ad771d",
      measurementId: "G-ZLSJM78DNS"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Mapa Leaflet
    const map = L.map("map").setView([0, 0], 2);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
    }).addTo(map);

    // Ubicación del usuario
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        map.setView([lat, lon], 13);
        L.marker([lat, lon])
          .addTo(map)
          .bindPopup("Estás aquí")
          .openPopup();
      });
    }

    // Marcadores desde Firebase
    db.ref("marcadores").on("value", (snapshot) => {
      const data = snapshot.val();
      if (data) {
        Object.values(data).forEach((marker) => {
          if (marker.lat && marker.lng) {
            L.marker([marker.lat, marker.lng])
              .addTo(map)
              .bindPopup(marker.nombre || "Marcador sin nombre");
          }
        });
      }
    });
  </script>
</body>
</html>
