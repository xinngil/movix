<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movix - Transporte Inteligente</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f2f2f2;
    }

    #mapa {
      height: 100%;
      width: 100%;
      z-index: 0;
    }

    #menuBtn {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 1001;
      background-color: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    #menuBtn:hover {
      background-color: #333;
    }

    #sidebar {
      position: absolute;
      top: 65px;
      left: 15px;
      width: 230px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.15);
      z-index: 1000;
      padding: 20px;
      display: none;
    }

    #sidebar h3 {
      margin-top: 0;
      font-size: 18px;
      color: #222;
    }

    .menu-btn {
      width: 100%;
      background-color: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin: 8px 0;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .menu-btn:hover {
      background-color: #e6e6e6;
    }
  </style>
</head>
<body>

  <!-- Botón de menú -->
  <button id="menuBtn">☰ Menú</button>

  <!-- Menú lateral -->
  <div id="sidebar">
    <h3>Movix</h3>
    <button class="menu-btn" onclick="alert('Ver perfil')">Perfil</button>
    <button class="menu-btn" onclick="alert('Ranking de rutas')">Ranking</button>
    <button class="menu-btn" onclick="alert('Buscar rutas')">Buscar Ruta</button>
    <button class="menu-btn" onclick="alert('Llamar emergencia')">Emergencia</button>
    <button class="menu-btn" onclick="alert('Ver comercios')">Comercio Local</button>
    <button class="menu-btn" onclick="alert('Cerrar sesión')">Cerrar sesión</button>
  </div>

  <!-- Mapa -->
  <div id="mapa"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Script mapa + menú -->
  <script>
    // Inicializar mapa
    var map = L.map('mapa').setView([-30.615, -71.190], 13);

    // Capa base gratuita
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Marcador inicial
    L.marker([-30.615, -71.190]).addTo(map)
      .bindPopup('Ubicación inicial Movix')
      .openPopup();

    // Mostrar/ocultar menú
    document.getElementById("menuBtn").addEventListener("click", function () {
      const sidebar = document.getElementById("sidebar");
      sidebar.style.display = (sidebar.style.display === "none" || sidebar.style.display === "") ? "block" : "none";
    });
  </script>
</body>
</html>
