<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movix – Mapa Global</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet Draw CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #map {
      height: 100%;
      width: 100%;
    }
    #btnDibujar {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #222;
      color: #fff;
      font-size: 2rem;
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="map">Cargando mapa...</div>
  <a id="btnDibujar" href="javascript:void(0)">＋</a>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Draw JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configuración Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDYt3_RCyA4PZlH6zo-CtFJKBvjPorQG60",
      authDomain: "movix-prod.firebaseapp.com",
      databaseURL: "https://movix-prod-default-rtdb.firebaseio.com",
      projectId: "movix-prod",
      storageBucket: "movix-prod.firebasestorage.app",
      messagingSenderId: "662438290984",
      appId: "1:662438290984:web:eb852b36dac6e991ad771d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Crear mapa
    const map = L.map("map").setView([0, 0], 2);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
    }).addTo(map);

    // Mostrar ubicación del usuario
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        map.setView([lat, lon], 14);
        L.marker([lat, lon])
          .addTo(map)
          .bindPopup("Estás aquí")
          .openPopup();
      });
    }

    // Mostrar marcadores simples desde Firebase
    db.ref("marcadores").on("value", (snapshot) => {
      const data = snapshot.val();
      if (data) {
        Object.values(data).forEach((marker) => {
          if (marker.lat && marker.lng) {
            L.marker([marker.lat, marker.lng])
              .addTo(map)
              .bindPopup(marker.nombre || "Marcador sin nombre");
          }
        });
      }
    });

    // Dibujo con Leaflet Draw
    const drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    const drawControl = new L.Control.Draw({
      edit: {
        featureGroup: drawnItems
      },
      draw: {
        polygon: true,
        marker: false,
        polyline: false,
        rectangle: false,
        circle: false,
        circlemarker: false
      }
    });

    let modoDibujo = false;

    document.getElementById("btnDibujar").addEventListener("click", () => {
      modoDibujo = true;
      map.addControl(drawControl);
      alert("📌 Dibuja el contorno del lugar en el mapa.");
    });

    map.on(L.Draw.Event.CREATED, function (e) {
      if (!modoDibujo) return;
      const layer = e.layer;
      drawnItems.addLayer(layer);

      const nombre = prompt("Nombre del lugar:");
      const tipo = prompt("Tipo de zona (paradero, ruta, etc):");

      if (!nombre || !tipo) {
        alert("⚠️ Debes ingresar nombre y tipo.");
        return;
      }

      const coords = layer.getLatLngs()[0].map(p => ({
        lat: p.lat,
        lng: p.lng
      }));

      const zona = {
        nombre,
        tipo,
        coords,
        fecha: new Date().toISOString()
      };

      db.ref("zonas").push(zona).then(() => {
        alert("✅ Zona guardada correctamente.");
      }).catch(err => {
        alert("❌ Error al guardar: " + err.message);
      });

      map.removeControl(drawControl);
      modoDibujo = false;
    });
  </script>
</body>
</html>
