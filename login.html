<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Movix</title>
  <style>
    body {
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }
    .login-container {
      max-width: 400px;
      margin: 8% auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      background: black;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    a {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: purple;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <input type="email" placeholder="Correo electrónico" />
    <input type="password" placeholder="Contraseña" />
    <select>
      <option>Invitado</option>
      <option>Pasajero</option>
      <option>Conductor</option>
      <option>Delivery</option>
      <option>Camión</option>
      <option>Comercio</option>
    </select>
    <button onclick="login()">Entrar</button>
    <a href="#" onclick="alert('Registro disponible próximamente')">¿No tienes cuenta? Regístrate</a>
  </div>

  <script>
    function login() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
