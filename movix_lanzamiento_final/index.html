<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movix - Plataforma Inteligente</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
</head>
<body>
  <div id="mapa"></div>
  <div id="ui-overlay">
    <div class="top-bar">
      <button onclick="toggleMenu()">☰ Menú</button>
      <button onclick="goToLogin()">👤 Perfil</button>
    </div>
    <div class="floating-buttons">
      <button onclick="filterLayer('buses')">🚌</button>
      <button onclick="filterLayer('taxis')">🚕</button>
      <button onclick="filterLayer('colectivos')">🚗</button>
      <button onclick="filterLayer('locales')">🏪</button>
      <button onclick="filterLayer('eventos')">🎉</button>
      <button onclick="filterLayer('camiones')">🚛</button>
    </div>
    <div id="popup" class="popup hidden"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
